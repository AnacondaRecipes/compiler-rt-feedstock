anaconda_config_version: 1
upstream_sources:
  - github:
      identifier: llvm/llvm-project
      use_max_tag: true
      include_regex: ^llvmorg-\d+\.\d+\.\d+$
      from_pattern: ^llvmorg-(.+)$
      to_pattern: \1
    packages:
      - compiler-rt
      - compiler-rt_linux-64
      - compiler-rt_linux-aarch64
      - compiler-rt_osx-arm64
      - compiler-rt_win-64
